# ============================================================
# Имя пайплайна (отображается во вкладке Actions на GitHub)
# ============================================================
name: CI Pipeline

# ============================================================
# Триггеры — когда запускать пайплайн
# ============================================================
on:
  push:
    branches: [ main, master ]        # При push в main или master
  pull_request:
    branches: [ main, master ]        # При создании PR в main или master

# ============================================================
# Задания (jobs) — что делать
# ============================================================
jobs:
  build-and-test:
    # Виртуальная машина, на которой выполняется пайплайн
    runs-on: ubuntu-latest
    
    steps:
    # Шаг 1: Получить код из репозитория
    # actions/checkout — стандартный GitHub Action, который клонирует репозиторий
    - name: Checkout code
      uses: actions/checkout@v4

    # Шаг 2: Установить .NET SDK
    # Без этого шага на виртуальной машине нет .NET
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'    # .NET 10

    # Шаг 3: Восстановить NuGet-пакеты
    # Аналог npm install в JavaScript
    - name: Restore dependencies
      run: dotnet restore

    # Шаг 4: Скомпилировать проект
    # --no-restore: не восстанавливать пакеты повторно
    - name: Build
      run: dotnet build --no-restore --configuration Release

    # Шаг 5: Запустить тесты
    # Если хоть один тест не пройдёт, пайплайн завершится с ошибкой
    - name: Run tests
      run: dotnet test --no-build --configuration Release --verbosity normal
